services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html
      - ./certs:/etc/nginx/certs:ro
      - /dev/shm/:/dev/shm/
    env_file:
      - .env
    logging:
          driver: "json-file"
          options:
            max-size: "10m"
            max-file: "3"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    extra_hosts:
      - "host.docker.internal:host-gateway"
