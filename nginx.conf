user  nginx;
worker_processes  auto;
worker_rlimit_nofile 1048576;
error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;
events {
    worker_connections  8196;
	use epoll;
    multi_accept on;
}
stream {
	tcp_nodelay on;
    map $ssl_preread_server_name $backend_dispatcher {
        {DOMAIN_REALITY}    tcp_to_xray_01;
		{DOMAIN_SUB01} tcp_to_xray_02;
        default	nginx_internal_http;
    }
    upstream tcp_to_xray_01 {
        server unix:/dev/shm/tcp_01.socket;
    }
	upstream nginx_internal_http {
        server 127.0.0.1:8443;
    }
    server {
        listen 443 fastopen=256;
        ssl_preread on;
		proxy_protocol on;
		proxy_connect_timeout 5s;
        proxy_timeout 1h;
        proxy_pass $backend_dispatcher;
    }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
					  
    log_format proxy_protocol '$proxy_protocol_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent"';
							  
    access_log  /var/log/nginx/access.log  main;
    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    # Buffer optimizations
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 4 8k;
    # Open file cache for static files
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    # Gzip compression (aggressive)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript 
               application/xml application/rss+xml application/atom+xml image/svg+xml
               application/x-javascript application/xhtml+xml application/x-font-ttf
               font/opentype image/x-icon;
    include /etc/nginx/conf.d/*.conf;
}
